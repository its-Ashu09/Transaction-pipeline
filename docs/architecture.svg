<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">AI transaction pipeline architecture</title>
  <desc id="desc">Client uploads to FastAPI, which stores job metadata in PostgreSQL and queues work in Redis. Celery reads the CSV, calls Gemini, and stores transactions and summaries in PostgreSQL. The client polls FastAPI for results.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".12"/>
    </filter>
    <style>
      .title{font:700 30px Inter,Arial,sans-serif;fill:#0f172a}
      .subtitle{font:400 15px Inter,Arial,sans-serif;fill:#475569}
      .box-title{font:700 19px Inter,Arial,sans-serif;fill:#0f172a}
      .box-text{font:400 14px Inter,Arial,sans-serif;fill:#475569}
      .edge{fill:none;stroke:#334155;stroke-width:2.4;marker-end:url(#arrow)}
      .edge-dash{fill:none;stroke:#7c3aed;stroke-width:2.4;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .label{font:600 13px Inter,Arial,sans-serif;fill:#334155}
      .pill{font:600 12px Inter,Arial,sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <text class="title" x="60" y="60">AI-Powered Transaction Processing Pipeline</text>
  <text class="subtitle" x="60" y="89">Asynchronous request path, durable state, and graceful LLM degradation</text>

  <g filter="url(#shadow)">
    <rect x="55" y="245" width="185" height="122" rx="16" fill="#fff" stroke="#94a3b8"/>
    <rect x="292" y="212" width="220" height="188" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="575" y="118" width="205" height="128" rx="16" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <rect x="575" y="367" width="205" height="144" rx="16" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="870" y="100" width="250" height="170" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <rect x="870" y="360" width="250" height="150" rx="16" fill="#fdf2f8" stroke="#ec4899" stroke-width="2"/>
  </g>

  <text class="box-title" x="90" y="282">API Client</text>
  <text class="box-text" x="90" y="312">Upload CSV</text>
  <text class="box-text" x="90" y="335">Poll status/results</text>

  <text class="box-title" x="328" y="250">FastAPI</text>
  <text class="box-text" x="328" y="280">Validate + stream file</text>
  <text class="box-text" x="328" y="303">Create pending Job</text>
  <text class="box-text" x="328" y="326">Enqueue job UUID</text>
  <text class="box-text" x="328" y="349">Serve persisted results</text>
  <rect x="328" y="365" width="78" height="23" rx="11" fill="#2563eb"/>
  <text class="pill" x="345" y="381">HTTP 202</text>

  <text class="box-title" x="611" y="156">Redis</text>
  <text class="box-text" x="611" y="184">Task broker</text>
  <text class="box-text" x="611" y="207">Queue + backpressure</text>

  <text class="box-title" x="611" y="405">Celery Worker</text>
  <text class="box-text" x="611" y="433">Clean + deduplicate</text>
  <text class="box-text" x="611" y="456">Detect anomalies</text>
  <text class="box-text" x="611" y="479">Classify + summarize</text>

  <text class="box-title" x="906" y="139">PostgreSQL</text>
  <text class="box-text" x="906" y="169">Jobs</text>
  <text class="box-text" x="906" y="192">Transactions</text>
  <text class="box-text" x="906" y="215">Structured summaries</text>
  <rect x="906" y="231" width="111" height="23" rx="11" fill="#16a34a"/>
  <text class="pill" x="920" y="247">Source of truth</text>

  <text class="box-title" x="906" y="399">Gemini API</text>
  <text class="box-text" x="906" y="429">Batched categories</text>
  <text class="box-text" x="906" y="452">One JSON narrative</text>
  <text class="box-text" x="906" y="475">3 attempts + fallback</text>

  <path class="edge" d="M240 288 H292"/>
  <text class="label" x="247" y="276">POST</text>
  <path class="edge" d="M292 342 H240"/>
  <text class="label" x="247" y="365">poll</text>
  <path class="edge" d="M512 250 C545 250 542 182 575 182"/>
  <text class="label" x="515" y="194">enqueue ID</text>
  <path class="edge" d="M677 246 V367"/>
  <text class="label" x="691" y="311">consume</text>
  <path class="edge" d="M512 305 C700 305 704 184 870 184"/>
  <text class="label" x="692" y="281">Job CRUD</text>
  <path class="edge" d="M780 425 C823 425 820 245 870 220"/>
  <text class="label" x="791" y="306">persist</text>
  <path class="edge-dash" d="M780 448 H870"/>
  <text class="label" x="796" y="438">JSON calls</text>

  <rect x="55" y="570" width="1065" height="65" rx="13" fill="#fff" stroke="#cbd5e1"/>
  <text class="label" x="80" y="596">Shared upload volume (assignment deployment)</text>
  <text class="box-text" x="80" y="619">FastAPI writes the validated upload; Celery reads it once and removes it after a successful database commit.</text>
</svg>
